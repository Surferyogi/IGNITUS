<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSP: allow CDN scripts + anthropic API calls -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com;
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
             font-src https://fonts.gstatic.com;
             connect-src *;
             img-src 'self' data: https:;">
  <title>Ignitus Portfolio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root {
      width: 100%; height: 100vh;
      background: #0A0D14;
      color: #E8EDF5;
      font-family: 'DM Sans', system-ui, sans-serif;
      overflow: hidden;
    }
    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0A0D14; z-index: 999;
      gap: 16px;
    }
    #loading .logo { font-size: 32px; font-weight: 800; color: #00D4FF; letter-spacing: -1px; }
    #loading .sub  { font-size: 12px; color: #6B7A99; }
    #loading .bar  { width: 120px; height: 2px; background: #1E2A3E; border-radius: 1px; overflow: hidden; }
    #loading .fill { width: 60%; height: 100%; background: #00D4FF; border-radius: 1px;
                     animation: slide 1s ease-in-out infinite alternate; }
    @keyframes slide { from { transform: translateX(-40px); } to { transform: translateX(60px); } }
    #db-path { position: fixed; bottom: 8px; left: 0; right: 0; text-align: center;
               font-size: 9px; color: #2A3A55; z-index: 1; pointer-events: none; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">IGNITUS</div>
    <div class="sub">Loading portfolio from database...</div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <div id="root"></div>
  <div id="db-path"></div>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Bootstrap: load DB then mount app -->
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      // Verify the DB bridge is available (set by preload.js)
      if (!window.portfolioDB) {
        document.getElementById('loading').innerHTML =
          '<div style="color:#FF4D6A;font-size:14px;padding:20px;text-align:center">Error: Database bridge not found.<br/>Make sure you launched via Electron.</div>';
        return;
      }

      try {
        // Load all data from SQLite
        const data = await window.portfolioDB.load();
        window.__PORTFOLIO_DATA__ = data;

        // Show DB path
        const pathEl = document.getElementById('db-path');
        if (pathEl) pathEl.textContent = '📁 ' + data.dbPath;

        // Dynamically load the portfolio app script
        const script = document.createElement('script');
        script.type = 'text/babel';
        script.setAttribute('data-type', 'module');

        // Fetch the app source
        const resp = await fetch('./app.jsx?v=' + Date.now()); // cache-bust
        const src  = await resp.text();
        script.textContent = src;
        document.body.appendChild(script);

      } catch (err) {
        document.getElementById('loading').innerHTML =
          `<div style="color:#FF4D6A;font-size:13px;padding:20px;font-family:monospace">
             <b>Load Error:</b><br/>${err.message}<br/>
             <pre style="font-size:10px;margin-top:8px;white-space:pre-wrap">${err.stack||''}</pre>
           </div>`;
      }
    });
  </script>
  <script>
    // Catch Babel transform errors and React render errors
    window.addEventListener('error', function(e) {
      var el = document.getElementById('loading');
      if (el) {
        el.style.display = 'flex';
        el.innerHTML = '<div style="color:#FF4D6A;font-size:13px;padding:20px;font-family:monospace;text-align:left;max-width:90vw">' +
          '<b>Runtime Error (please screenshot and send):</b><br/><br/>' +
          '<b>Message:</b> ' + (e.message||'unknown') + '<br/>' +
          '<b>File:</b> ' + (e.filename||'') + '<br/>' +
          '<b>Line:</b> ' + e.lineno + ' Col: ' + e.colno + '<br/><br/>' +
          '<pre style="font-size:10px;white-space:pre-wrap;overflow:auto;max-height:300px">' + 
          ((e.error&&e.error.stack)||'no stack') + '</pre></div>';
      }
    });
  </script>
</body>
</html>
